name: release

# Build kenlm as self-contained static binaries on native per-OS runners,
# package each target, and publish a GitHub Release on tag.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full 6-platform matrix — dispatch + tag.
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    fail-fast: false
    strategy:
      matrix:
        include:
          - { target: x86_64-linux-gnu,  runner: ubuntu-latest,    os: linux,   }
          - { target: aarch64-linux-gnu, runner: ubuntu-24.04-arm, os: linux,   }
          - { target: x86_64-macos,      runner: macos-13,         os: macos,   }
          - { target: aarch64-macos,     runner: macos-14,         os: macos,   }
          - { target: x86_64-windows,    runner: windows-latest,   os: windows, triplet: x64-windows-static   }
          - { target: aarch64-windows,   runner: windows-11-arm,   os: windows, triplet: arm64-windows-static }
    continue-on-error: ${{ matrix.target == 'aarch64-windows' }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # ---- install deps -------------------------------------------------
      - name: Install deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libboost-program-options-dev libboost-system-dev \
            libboost-thread-dev libboost-iostreams-dev \
            zlib1g-dev libbz2-dev liblzma-dev

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install cmake boost zlib bzip2 xz dylibbundler
          {
            echo "CMAKE_PREFIX_PATH=$(brew --prefix zlib);$(brew --prefix bzip2);$(brew --prefix xz)"
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          } >> "$GITHUB_ENV"

      - name: Install deps (Windows / vcpkg static)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            boost-program-options boost-system boost-thread boost-iostreams `
            zlib bzip2 liblzma `
            --triplet ${{ matrix.triplet }}

      # ---- build --------------------------------------------------------
      - name: Build (Unix)
        if: matrix.os != 'windows'
        run: bash scripts/build.sh

      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
        run: pwsh scripts/build.ps1

      # ---- smoke --------------------------------------------------------
      - name: Smoke test (train -> build_binary -> query)
        shell: bash
        run: bash scripts/smoke.sh

      # ---- package ------------------------------------------------------
      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: pwsh scripts/package.ps1

      # ---- verify self-contained ---------------------------------------
      - name: Verify self-contained (staged binary)
        if: matrix.os != 'windows'
        run: |
          set -e
          bin="dist/kenlm-${{ matrix.target }}/bin/lmplz"
          case "${{ matrix.os }}" in
            linux)
              out="$(ldd "$bin" 2>&1 || true)"; echo "$out"
              echo "$out" | grep -q "not a dynamic executable" \
                || { echo "FAIL: not fully static"; exit 1; }
              ;;
            macos)
              otool -L "$bin"
              otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
                && { echo "FAIL: binary links Homebrew dylibs"; exit 1; } || true
              ;;
          esac

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/kenlm-${{ matrix.target }}/bin/lmplz
          du -h dist/kenlm-${{ matrix.target }}.tar.gz

      # ---- upload -------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kenlm-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # Cheap, fast feedback on push/PR: Linux only, no packaging.
  smoke-linux:
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libboost-program-options-dev libboost-system-dev \
            libboost-thread-dev libboost-iostreams-dev \
            zlib1g-dev libbz2-dev liblzma-dev
      - name: Build
        run: bash scripts/build.sh
      - name: Smoke test
        run: bash scripts/smoke.sh

  # Publish on tag.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          ls -la
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
