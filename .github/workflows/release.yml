name: release

# Build kenlm as self-contained static binaries on native per-OS runners,
# package each target, and publish a GitHub Release on tag.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full matrix — dispatch + tag.
  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-gnu,   runner: ubuntu-latest,    os: linux,   libc: gnu,  }
          - { target: aarch64-linux-gnu,  runner: ubuntu-24.04-arm, os: linux,   libc: gnu,  }
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                 }
          - { target: x86_64-macos,       runner: macos-13,         os: macos                 }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows, triplet: x64-windows-static   }
          - { target: aarch64-windows,    runner: windows-11-arm,   os: windows, triplet: arm64-windows-static }
    continue-on-error: ${{ matrix.target == 'aarch64-windows' || matrix.target == 'aarch64-linux-musl' || matrix.target == 'x86_64-macos' }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # ---- install deps ----------------------------------------------------
      - name: Install deps (Linux gnu)
        if: matrix.libc == 'gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libboost-program-options-dev libboost-system-dev \
            libboost-thread-dev libboost-iostreams-dev libboost-test-dev \
            zlib1g-dev libbz2-dev liblzma-dev

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install cmake boost zlib bzip2 xz dylibbundler
          {
            echo "CMAKE_PREFIX_PATH=$(brew --prefix zlib);$(brew --prefix bzip2);$(brew --prefix xz)"
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          } >> "$GITHUB_ENV"

      - name: Install deps (Windows / vcpkg static)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { 'C:\vcpkg' }
            "VCPKG_ROOT=$env:VCPKG_ROOT" | Add-Content -Path $env:GITHUB_ENV
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            boost-program-options boost-system boost-thread boost-iostreams boost-test `
            boost-ptr-container boost-interprocess boost-random boost-range boost-unordered `
            boost-functional boost-optional boost-lexical-cast boost-utility boost-smart-ptr boost-core `
            zlib bzip2 liblzma `
            --triplet ${{ matrix.triplet }}

      # ---- build -----------------------------------------------------------
      - name: Build (Linux gnu — host)
        if: matrix.libc == 'gnu'
        run: bash scripts/build.sh

      # Alpine container: musl-native toolchain, Boost from source (Alpine
      # ships no static Boost), FORCE_STATIC -> fully static musl binary.
      - name: Build (Linux musl — Alpine container)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 /w/scripts/build-alpine.sh

      - name: Build (macOS)
        if: matrix.os == 'macos'
        run: bash scripts/build.sh

      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
        run: pwsh scripts/build.ps1

      # ---- smoke -----------------------------------------------------------
      # For musl: run smoke INSIDE alpine — this is the runtime verification
      # that the musl-static binary actually works on Alpine.
      - name: "Smoke test (host: gnu / macos / windows)"
        if: matrix.libc != 'musl'
        run: bash scripts/smoke.sh

      - name: Smoke test on Alpine (musl — proves Alpine compat)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'apk add --no-cache bash >/dev/null && bash /w/scripts/smoke.sh'

      # ---- benchmark minimal pipeline -------------------------------------
      # Runs on host for ALL targets so musl vs glibc timings are directly
      # comparable (the musl-static binary runs on the ubuntu host fine).
      - name: Benchmark minimal pipeline
        shell: bash
        run: |
          mkdir -p dist
          rm -f dist/bench-${{ matrix.target }}.tsv
          bash scripts/bench.sh TARGET=${{ matrix.target }} | tee dist/bench-${{ matrix.target }}.tsv

      # ---- package ---------------------------------------------------------
      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: pwsh scripts/package.ps1

      # ---- verify self-contained ------------------------------------------
      - name: Verify self-contained (staged binary)
        if: matrix.os != 'windows'
        run: |
          set -e
          bin="dist/kenlm-${{ matrix.target }}/bin/lmplz"
          case "${{ matrix.os }}" in
            linux)
              out="$(ldd "$bin" 2>&1 || true)"; echo "$out"
              echo "$out" | grep -q "not a dynamic executable" \
                || { echo "FAIL: not fully static"; exit 1; }
              ;;
            macos)
              otool -L "$bin"
              otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
                && { echo "FAIL: binary links Homebrew dylibs"; exit 1; } || true
              ;;
          esac

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/kenlm-${{ matrix.target }}/bin/lmplz
          du -h dist/kenlm-${{ matrix.target }}.tar.gz

      # ---- upload ----------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kenlm-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # Cheap, fast feedback on push/PR: Linux gnu only, no packaging.
  smoke-linux:
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libboost-program-options-dev libboost-system-dev \
            libboost-thread-dev libboost-iostreams-dev libboost-test-dev \
            zlib1g-dev libbz2-dev liblzma-dev
      - name: Build
        run: bash scripts/build.sh
      - name: Smoke test
        run: bash scripts/smoke.sh

  # Publish on tag.
  release:
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true